server {
    keepalive_timeout 1d;
    send_timeout 1d;
    client_body_timeout 1d;
    client_header_timeout 1d;
    proxy_connect_timeout 1d;
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
    fastcgi_connect_timeout 1d;
    fastcgi_read_timeout 1d;
    fastcgi_send_timeout 1d;
    memcached_connect_timeout 1d;
    memcached_read_timeout 1d;
    memcached_send_timeout 1d;

    listen       8080;
    server_name  localhost;
    error_page 404 /index.html;
    client_max_body_size 10M;
    port_in_redirect off;
    location / {
        proxy_redirect off;
        root   /usr/share/nginx/html;
        try_files $uri $uri.html /index.html =404;
    }
    location /api {
        client_max_body_size 10M;
        resolver resolverPLACEHOLDE valid=30s;
        set $upstreame urlPLACEHOLDE;
        proxy_pass $upstreame;
        proxy_http_version 1.1;
        proxy_set_header Connection $http_connection;
        proxy_set_header Upgrade $http_upgrade;
    }
}